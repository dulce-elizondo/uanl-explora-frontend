<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos – UANL Explora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="app-header"></header>

<div class="app-search">
  <input type="text" id="buscador" placeholder="🔍 Buscar en favoritos..." oninput="filtrar(this.value)">
</div>

<h2 class="page-title">♥ Favoritos</h2>
<p class="page-subtitle">Tus lugares guardados</p>

<div class="cards-container" id="cards-container"></div>

<nav id="bottom-nav"></nav>

<script src="script.js"></script>
<script>
var lugaresFav = [];

document.addEventListener('DOMContentLoaded', function() {
  renderHeader();
  renderBottomNav('favoritos');
  renderModalSugerir();

  var usuario = getUsuarioActual();
  if (!usuario) {
    document.getElementById('cards-container').innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">🔒</div>' +
        '<h3>Acceso requerido</h3>' +
        '<p>Debes <a href="registro.html">iniciar sesión</a> para ver tus favoritos.</p>' +
      '</div>';
    return;
  }

  var favIds = getFavoritos();
  var todos  = getLugares();
  lugaresFav = todos.filter(function(l) { return favIds.indexOf(l.id) !== -1; });
  renderCards(lugaresFav);
});

function renderCards(lista) {
  var container = document.getElementById('cards-container');
  if (!lista.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">♡</div>' +
        '<h3>Aún no se ha guardado nada en favoritos</h3>' +
        '<p>Explora los lugares del campus y toca <strong>♡ Favorito</strong> en los que más te gusten.</p>' +
        '<br><a href="populares.html" style="color:var(--azul);font-weight:700">Ver lugares populares →</a>' +
      '</div>';
    return;
  }
  container.innerHTML = lista.map(function(l) { return renderCard(l); }).join('');
}

function filtrar(query) {
  var q = query.toLowerCase();
  renderCards(lugaresFav.filter(function(l) {
    return l.nombre.toLowerCase().includes(q) || l.descripcion.toLowerCase().includes(q);
  }));
}
</script>
</body>
</html>
