<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Populares – UANL Explora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="app-header"></header>

<div class="app-search">
  <input type="text" id="buscador" placeholder="🔍 Buscar lugar popular..." oninput="filtrar(this.value)">
</div>

<h2 class="page-title">⭐ Populares</h2>
<p class="page-subtitle">Top 10 lugares mejor calificados del campus</p>

<div class="cards-container" id="cards-container"></div>

<nav id="bottom-nav"></nav>

<script src="script.js"></script>
<script>
var lugaresTop = [];

document.addEventListener('DOMContentLoaded', function() {
  renderHeader();
  renderBottomNav('populares');
  renderModalSugerir();
  lugaresTop = getTop10();
  renderCards(lugaresTop);
  aplicarQueryURL(filtrar);
});

function renderCards(lista) {
  var container = document.getElementById('cards-container');
  if (!lista.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">😕</div>' +
        '<h3>Sin resultados</h3>' +
        '<p>No se encontraron lugares con ese nombre.</p>' +
      '</div>';
    return;
  }
  container.innerHTML = lista.map(function(l, i) {
    var rank = i + 1;
    var cls  = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-n';
    return '<div class="rank-row">' +
      '<span class="rank-badge ' + cls + '">' + rank + '</span>' +
      renderCard(l) +
    '</div>';
  }).join('');
}

function filtrar(query) {
  var q = query.toLowerCase();
  renderCards(lugaresTop.filter(function(l) {
    return l.nombre.toLowerCase().includes(q) || l.descripcion.toLowerCase().includes(q);
  }));
}
</script>
</body>
</html>
